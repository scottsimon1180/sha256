<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Icon Tester</title>

    <link id="dynamic-apple-icon" rel="apple-touch-icon" href="">

    <style>
        /* System font stack and strict body constraints to mimic native applications */
        :root {
            --bg-color: #000000;
            --surface-color: #1c1c1e;
            --text-color: #ffffff;
            --accent-color: #0a84ff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Disables web-like scrolling */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-user-select: none; /* Prevents text selection */
        }

        /* The container holding the visual prototype */
        #preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        /* Simulates the continuous squircle of an iOS icon. 
           180x180 is the standard maximum resolution for an iPhone touch icon.
        */
        #icon-preview {
            width: 180px;
            height: 180px;
            background-color: var(--surface-color);
            border-radius: 40px; 
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none; /* Hidden until an image is loaded */
            margin-bottom: 20px;
        }

        /* Native-feeling button styling */
        .action-button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px 32px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .action-button:active {
            opacity: 0.7;
        }

        /* Hidden file input invoked via the action button */
        #file-input {
            display: none;
        }

        /* The instructional overlay directed at the physical Safari Share button.
           Positioned absolutely at the bottom to account for the Home Indicator.
        */
        #instruction-overlay {
            position: fixed;
            bottom: -100px;
            left: 0;
            width: 100%;
            background: rgba(28, 28, 30, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px 0 40px 0; /* Padding accounts for the safe area */
            text-align: center;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.3);
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #instruction-overlay.visible {
            bottom: 0;
        }

        .instruction-text {
            font-size: 16px;
            font-weight: 500;
            margin: 0 20px 10px 20px;
        }

        .bounce-arrow {
            font-size: 24px;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(10px); }
            60% { transform: translateY(5px); }
        }
    </style>
</head>
<body>

    <div id="preview-container">
        <img id="icon-preview" alt="Icon Preview" />
        
        <button class="action-button" id="upload-trigger">Select Icon Image</button>
        <input type="file" id="file-input" accept="image/png, image/jpeg" />
    </div>

    <div id="instruction-overlay">
        <p class="instruction-text">Icon loaded. Tap the Share button below, then select <strong>"Add to Home Screen"</strong>.</p>
        <div class="bounce-arrow">⬇</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const fileInput = document.getElementById('file-input');
            const uploadTrigger = document.getElementById('upload-trigger');
            const iconPreview = document.getElementById('icon-preview');
            const dynamicAppleIcon = document.getElementById('dynamic-apple-icon');
            const instructionOverlay = document.getElementById('instruction-overlay');

            // Route the button click to the hidden input
            uploadTrigger.addEventListener('click', () => {
                fileInput.click();
            });

            // Process the file once selected
            fileInput.addEventListener('change', (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                
                reader.onload = (e) => {
                    const base64Data = e.target.result;
                    
                    // 1. Render the image on the screen to confirm selection
                    iconPreview.src = base64Data;
                    iconPreview.style.display = 'block';
                    
                    // 2. Inject the Base64 data into the document head for Safari to capture
                    dynamicAppleIcon.href = base64Data;
                    
                    // 3. Trigger the animation to display the manual instructions
                    instructionOverlay.classList.add('visible');
                    
                    // Optional: Update button text to imply a reset/change state
                    uploadTrigger.textContent = "Change Image";
                };

                // Read the file as a data URL to circumvent local path restrictions
                reader.readAsDataURL(file);
            });
        });
    </script>
</body>
</html>
