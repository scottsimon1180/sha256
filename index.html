<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Icon Tester</title>

    <link id="dynamic-apple-icon" rel="apple-touch-icon" href="">

    <style>
        /* Light mode color space mirroring native iOS UI variables */
        :root {
            --bg-color: #ffffff;
            --surface-color: #f2f2f7; /* Standard iOS grouped background */
            --text-color: #000000;
            --accent-color: #007aff; /* Standard iOS blue */
            --shadow-color: rgba(0, 0, 0, 0.15);
            --overlay-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-user-select: none; 
        }

        /* Fixed structural container preventing any layout reflows */
        #preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Static margin prevents shifts when the overlay appears */
            margin-bottom: 60px; 
        }

        /* Continuous squircle rendering with a fixed aspect ratio */
        #icon-preview {
            width: 180px;
            height: 180px;
            background-color: var(--surface-color);
            border-radius: 40px; 
            object-fit: cover;
            box-shadow: 0 8px 24px var(--shadow-color);
            margin-bottom: 32px;
            display: block; /* Always occupies spatial volume */
            border: 1px solid rgba(0,0,0,0.05); /* Subtle definition for light mode */
        }

        .action-button {
            background-color: var(--surface-color);
            color: var(--accent-color);
            border: none;
            border-radius: 14px;
            padding: 16px 32px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease, background-color 0.2s ease;
            width: 220px; /* Fixed width prevents button resizing upon text change */
        }

        .action-button:active {
            opacity: 0.7;
            background-color: #e5e5ea;
        }

        #file-input {
            display: none;
        }

        /* Fixed overlay that utilizes opacity rather than physical translation */
        #instruction-overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--overlay-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            /* Utilizes native safe area insets to avoid the Home Indicator */
            padding: 20px 0 calc(20px + env(safe-area-inset-bottom)) 0; 
            text-align: center;
            border-top: 1px solid rgba(0,0,0,0.1);
            
            /* Spatial immutability logic */
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #instruction-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .instruction-text {
            font-size: 16px;
            font-weight: 500;
            margin: 0 20px 10px 20px;
            color: #333333;
        }

        .bounce-arrow {
            font-size: 24px;
            color: var(--accent-color);
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(8px); }
            60% { transform: translateY(4px); }
        }
    </style>
</head>
<body>

    <div id="preview-container">
        <img id="icon-preview" alt="Icon Preview" src="data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22180%22%20height%3D%22180%22%3E%3Crect%20width%3D%22180%22%20height%3D%22180%22%20fill%3D%22%23f2f2f7%22%2F%3E%3Cpath%20d%3D%22M90%2065%20v50%20M65%2090%20h50%22%20stroke%3D%22%23c7c7cc%22%20stroke-width%3D%224%22%20stroke-linecap%3D%22round%22%2F%3E%3C%2Fsvg%3E" />
        
        <button class="action-button" id="upload-trigger">Select Icon</button>
        <input type="file" id="file-input" accept="image/png, image/jpeg" />
    </div>

    <div id="instruction-overlay">
        <p class="instruction-text">Icon loaded. Tap the Share button below, then select <strong>"Add to Home Screen"</strong>.</p>
        <div class="bounce-arrow">⬇</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const fileInput = document.getElementById('file-input');
            const uploadTrigger = document.getElementById('upload-trigger');
            const iconPreview = document.getElementById('icon-preview');
            const dynamicAppleIcon = document.getElementById('dynamic-apple-icon');
            const instructionOverlay = document.getElementById('instruction-overlay');

            uploadTrigger.addEventListener('click', () => {
                fileInput.click();
            });

            fileInput.addEventListener('change', (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                
                reader.onload = (e) => {
                    const base64Data = e.target.result;
                    
                    // Inject user data; replaces the SVG placeholder
                    iconPreview.src = base64Data;
                    dynamicAppleIcon.href = base64Data;
                    
                    // Execute non-destructive state changes
                    instructionOverlay.classList.add('visible');
                    uploadTrigger.textContent = "Change Icon";
                };

                reader.readAsDataURL(file);
            });
        });
    </script>
</body>
</html>
